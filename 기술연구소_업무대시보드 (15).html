<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기술연구소 업무 대시보드</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --nav:#0e1a2f; --nav2:#132444; --nav-line:#1e3157;
  --nav-muted:#6b7ea0; --nav-txt:#c7d5ee;
  --bg:#f4f6fb; --card:#ffffff; --line:#e4eaf5;
  --ink:#1e293b; --muted:#64748b; --faint:#94a3b8;
  --pri:#2f5fd0; --pri-soft:#eef3fd; --pri-soft2:#f7faff; --pri-line:#d5e2fb;
  --green:#12a150; --green-soft:#e5f6ec;
  --amber:#e08b00; --amber-soft:#fdf1dc;
  --gray:#8592a6; --gray-soft:#eef1f5;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:var(--bg); color:var(--ink); display:flex; height:100vh; overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}

/* ============ SIDEBAR ============ */
.sidebar{
  width:236px; flex-shrink:0; background:var(--nav); color:var(--nav-txt);
  display:flex; flex-direction:column; height:100vh;
}
.brand{display:flex;align-items:center;gap:11px;padding:20px 18px 18px;border-bottom:1px solid var(--nav-line)}
.brand .logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#2f5fd0,#5aa0f2);
  display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px;flex-shrink:0}
.brand h1{font-size:14px;font-weight:700;color:#fff;line-height:1.25}
.brand p{font-size:11px;color:var(--nav-muted);margin-top:2px}
.nav{flex:1;overflow-y:auto;padding:14px 12px}
.nav-sec{font-size:11px;color:var(--nav-muted);font-weight:600;letter-spacing:.04em;padding:14px 10px 7px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  padding:10px 11px;border-radius:9px;font-size:13.5px;color:var(--nav-txt);margin-bottom:2px;transition:.13s}
.nav-item:hover{background:var(--nav2)}
.nav-item.active{background:linear-gradient(90deg,#1c3a72,#173163);color:#fff;font-weight:600;box-shadow:inset 3px 0 0 #5aa0f2}
.nav-item .ico{width:17px;text-align:center;opacity:.9}
.nav-item .ext{margin-left:auto;font-size:11px;color:var(--nav-muted)}
.nav-user{display:flex;align-items:center;gap:10px;padding:14px 16px;border-top:1px solid var(--nav-line)}
.nav-user .av{width:34px;height:34px;border-radius:50%;background:#2f5fd0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
.nav-user b{font-size:13px;color:#fff;display:block}
.nav-user span{font-size:11px;color:var(--nav-muted)}
.nav-user .dot{width:7px;height:7px;border-radius:50%;background:#3ad07a;margin-left:auto}

/* ============ MAIN ============ */
.main{flex:1;min-width:0;height:100vh;overflow-y:auto;padding:26px 30px 60px}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-head h2{font-size:21px;font-weight:800}
.page-head .sub{font-size:12.5px;color:var(--muted);margin-top:3px}
.ph-left{display:flex;align-items:center;gap:12px;min-width:0}
.btn-back{width:38px;height:38px;border-radius:10px;background:#fff;border:1px solid var(--line);color:var(--muted);font-size:18px;font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.13s}
.btn-back:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-soft)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:9px;font-size:13px;font-weight:600;transition:.14s}
.btn-pri{background:var(--pri);color:#fff}
.btn-pri:hover{background:#264fb0}
.btn-line{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn-line:hover{border-color:var(--pri);color:var(--pri)}
.btn-ghost{background:var(--pri-soft);color:var(--pri)}
.btn-ghost:hover{background:#e2ebfb}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:8px}

/* mission */
.mission{background:linear-gradient(90deg,#eef3fd,#f6f9ff);border:1px solid var(--pri-line);
  border-left:5px solid var(--pri);border-radius:14px;padding:16px 20px;margin-bottom:20px}
.mission .lbl{font-size:12px;color:var(--pri);font-weight:700;margin-bottom:6px}
.mission p{font-size:14.5px;font-weight:600;color:#20304d;line-height:1.5}

/* kpi grid */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:13px;margin-bottom:14px}
.kpi{background:linear-gradient(160deg,var(--pri-soft),var(--pri-soft2));border:1px solid var(--pri-line);
  border-radius:14px;padding:20px 14px;text-align:center}
.kpi .big{font-size:30px;font-weight:800;color:var(--pri);line-height:1}
.kpi .name{font-size:12.5px;font-weight:600;color:#34415a;margin:9px 0 5px}
.kpi .frac{font-size:11.5px;color:var(--faint)}
.team-avg{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px;text-align:center;
  font-size:13.5px;color:var(--muted);margin-bottom:26px}
.team-avg b{color:var(--pri);font-weight:800;font-size:15px}

/* dashboard: mission + stats top row */
.dash-top{display:flex;align-items:stretch;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.dash-mission{flex:2;min-width:300px;background:linear-gradient(90deg,#eef3fd,#f6f9ff);border:1px solid var(--pri-line);border-left:4px solid var(--pri);border-radius:10px;padding:11px 16px}
.dm-lbl{font-size:12.5px;font-weight:800;color:var(--pri);margin-bottom:5px}
.dm-txt{font-size:16px;font-weight:700;color:#20304d;line-height:1.45}
.dash-stats2{flex:1;min-width:320px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 16px}
.ds2-lbl{font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:8px}
.ds2-row{display:flex;gap:9px}
.ds2{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;font-size:12.5px;color:var(--muted);font-weight:600;border-radius:9px;padding:9px 12px;white-space:nowrap}
.ds2 b{font-size:18px;font-weight:800}
.ds2.s-run{background:#eef3fd}.ds2.s-run b{color:var(--pri)}
.ds2.s-done{background:var(--green-soft)}.ds2.s-done b{color:var(--green)}
.ds2.s-op{background:var(--amber-soft)}.ds2.s-op b{color:var(--amber)}
.ds2.s-rate{background:var(--gray-soft)}.ds2.s-rate b{color:#334155}
/* dashboard: 전략목표 goal cards */
.dash-goal-label{display:flex;justify-content:space-between;align-items:baseline;margin:0 2px 12px}
.dash-goal-label span{font-size:14.5px;font-weight:800;color:var(--pri);letter-spacing:.03em}
.dash-goal-label b{font-size:14px;color:var(--muted);font-weight:700}
.dash-goal-label b:before{content:'📊 '}
.goal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
@media(max-width:980px){.goal-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.goal-grid{grid-template-columns:1fr}}
.goal-card.active{background:#fff;border-color:var(--pri);box-shadow:0 6px 20px rgba(47,95,208,.14)}
/* 펼쳐진 전략목표 상세 — 해당 줄 바로 아래 전체 폭 */
.goal-detail{background:#fff;border:1.5px solid var(--pri);border-radius:14px;padding:16px 18px;margin-bottom:20px;box-shadow:0 6px 20px rgba(47,95,208,.08)}
.gd-head{display:flex;align-items:center;gap:10px;padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--pri-line)}
.gd-head b{font-size:16px;font-weight:800;color:var(--pri)}
.gd-head span{font-size:12.5px;color:var(--faint)}
.gd-head .btn{margin-left:auto}
.gd-body{display:flex;flex-direction:column;gap:8px}
.goal-card{background:linear-gradient(160deg,var(--pri-soft),var(--pri-soft2));border:1.5px solid var(--pri-line);border-radius:14px;padding:16px 17px;cursor:pointer;transition:.14s}
.goal-card:hover{border-color:var(--pri);box-shadow:0 6px 18px rgba(47,95,208,.08)}
.goal-card.active{border-color:var(--pri);box-shadow:0 6px 20px rgba(47,95,208,.14)}
.goal-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.goal-name{font-size:16px;font-weight:800;color:#20304d}
.goal-pct{font-size:29px;font-weight:800;color:var(--pri);line-height:1}
.goal-sub{font-size:11px;color:var(--muted);margin-top:4px}
.goal-sub{font-size:12.5px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:8px}
.goal-more{margin-left:auto;font-size:12.5px;font-weight:700;color:var(--pri)}
.goal-body{margin-top:13px;padding-top:13px;border-top:1px solid var(--pri-line);display:flex;flex-direction:column;gap:8px}
.goal-list{list-style:none;margin:11px 0 0;padding:11px 0 0;border-top:1px solid var(--pri-line);display:flex;flex-direction:column;gap:6px}
.goal-list li{display:flex;justify-content:space-between;gap:8px;font-size:13.5px;color:#3a4a63}
.goal-list li span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.goal-list li i{font-style:normal;font-weight:800;color:var(--pri);flex-shrink:0}
.goal-list.none{text-align:center;font-size:12px;color:var(--faint)}
.goal-empty{font-size:12.5px;color:var(--faint);text-align:center;padding:10px}
.gtask{background:#f6f9ff;border:1px solid #e5edfb;border-radius:10px;overflow:hidden}
.gtask-h{display:flex;align-items:center;gap:11px;padding:10px 13px;cursor:pointer}
.gtask-h:hover{background:#eef4ff}
.gtask-caret{color:var(--faint);font-size:9px;width:10px;flex-shrink:0;transition:.2s}
.gtask.open .gtask-caret{transform:rotate(90deg)}
.gtask-t{flex:1;min-width:0;font-size:14.5px;font-weight:700;color:#20304d;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gtask-who{font-size:12px;font-weight:600;color:var(--muted);background:#e7edf6;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.gtask-p{display:flex;align-items:center;gap:10px;flex-shrink:0}
.gtask-bar{display:inline-block;width:110px;height:7px;border-radius:4px;background:#e6ebf3;overflow:hidden}
.gtask-bar span{display:block;height:100%;border-radius:4px}
.gtask-p b{font-size:14px;font-weight:800;color:#334155;width:40px;text-align:right}
.gtask-tools{display:flex;gap:2px;flex-shrink:0}
.gtask-body{padding:4px 13px 12px;background:#fff;border-top:1px solid #e5edfb}
.gs-lead1{padding:7px 0}
.gs-lead-h,.gs-lead2{display:flex;align-items:center;gap:9px}
.gs-lead2{padding:5px 0 5px 20px}
.gs-tag{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:5px;background:#e9edf3;color:#64748b;flex-shrink:0}
.gs-tag.t1{background:#dfeafe;color:#2f5fd0}
.gs-t{flex:1;min-width:0;font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gs-who{font-size:11px;font-weight:700;color:#2f5fd0;background:#e4ecfd;padding:2px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.own-sel{border:1px solid var(--line);border-radius:7px;padding:4px 7px;font-size:11.5px;font-weight:600;color:var(--pri);background:#eef3fd;flex-shrink:0;max-width:104px}
.own-sel:focus{outline:none;border-color:var(--pri)}
.gb-own{font-size:10px;font-weight:700;color:#2f5fd0;background:#e4ecfd;padding:1px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-left:6px}
.snap-list{display:flex;flex-direction:column;gap:8px}
.snap-row{display:flex;align-items:center;gap:9px;background:#f8fafd;border:1px solid var(--line);border-radius:10px;padding:11px 14px;flex-wrap:wrap}
.snap-wk{font-size:13.5px;font-weight:800;color:var(--pri)}
.snap-dt{font-size:12px;color:var(--faint);flex:1;min-width:60px}
.gs-dl{font-size:11.5px;color:var(--muted);white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:5px}
.gs-lead-h b,.gs-lead2 b{font-size:12.5px;font-weight:800;color:var(--pri);width:38px;text-align:right;flex-shrink:0}
.gs-none{font-size:12px;color:var(--faint);padding:8px 2px}
.gs-hint{font-size:10.5px;color:var(--faint);margin-top:8px;padding-top:8px;border-top:1px dashed #e5edfb}
.goal-add{border:1px dashed var(--pri-line);border-radius:9px;padding:9px;font-size:12.5px;font-weight:600;color:var(--pri);background:var(--pri-soft);margin-top:2px}
.goal-add:hover{background:#e2ebfb}

/* section card */
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-bottom:22px}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.panel-head h3{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}

/* stat strip */
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{border-radius:12px;padding:15px;text-align:center}
.stat .n{font-size:24px;font-weight:800;line-height:1}
.stat .l{font-size:12px;color:var(--muted);margin-top:5px}
.stat.s-run{background:#eef3fd}.stat.s-run .n{color:var(--pri)}
.stat.s-done{background:var(--green-soft)}.stat.s-done .n{color:var(--green)}
.stat.s-op{background:var(--amber-soft)}.stat.s-op .n{color:var(--amber)}
.stat.s-rate{background:var(--gray-soft)}.stat.s-rate .n{color:#334155}

/* task rows (dashboard) */
.dash-cat{margin-bottom:6px}
.dash-cat-head{display:flex;align-items:baseline;gap:10px;padding:12px 8px 7px;margin-top:6px;border-bottom:2px solid var(--pri-line)}
.dash-cat-head b{font-size:13.5px;font-weight:800;color:var(--pri)}
.dash-cat-head span{font-size:11.5px;color:var(--faint)}
.trow{display:flex;align-items:center;gap:14px;padding:14px 8px;border-bottom:1px solid #f0f3f8}
.trow:last-child{border-bottom:none}
.trow .dotc{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.trow .tmain{flex:1;min-width:0}
.trow .ttl{font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px}
.trow .cat{color:var(--pri);font-weight:700}
.trow .meta{font-size:11.5px;color:var(--faint);margin-top:4px}
.trow .who{font-size:12px;color:var(--muted);white-space:nowrap}
.badge{font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px;white-space:nowrap}
.b-done{background:#dfeafe;color:#2f5fd0}
.b-op{background:var(--green-soft);color:var(--green)}
.b-rdy{background:var(--amber-soft);color:var(--amber)}
.b-none{background:var(--gray-soft);color:var(--gray)}
.prog{display:flex;align-items:center;gap:9px;width:150px;flex-shrink:0}
.prog .bar{flex:1;height:7px;border-radius:5px;background:#e8edf5;overflow:hidden}
.prog .fill{height:100%;background:linear-gradient(90deg,#3d6ee5,#63a4f5);border-radius:5px}
.prog .pct{font-size:12px;font-weight:700;color:var(--muted);width:38px;text-align:right}
.row-tools{display:flex;gap:4px;flex-shrink:0}
.icon-btn{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:14px}
.icon-btn:hover{background:#f0f3f8;color:var(--pri)}

/* ============ 선행지표 ============ */
.lead-strip{display:flex;flex-wrap:wrap;align-items:center;gap:8px 18px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 16px;margin-bottom:16px;font-size:12.5px;color:var(--muted)}
.lead-strip b{color:var(--ink);font-weight:800;font-size:14px}
.lead-strip .warn b{color:#d33}
.lead-strip .sep{width:1px;height:15px;background:var(--line)}
.strat-list{display:flex;flex-direction:column;gap:12px}
.sg-card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.sg-card.misc{border-style:dashed;border-color:var(--pri-line);background:#fcfdff}
.sg-head{display:flex;align-items:center;gap:12px;padding:15px 18px;cursor:pointer}
.sg-head:hover{background:#f8fafd}
.sg-caret{color:var(--faint);font-size:11px;transition:.2s;flex-shrink:0}
.sg-card.open .sg-caret{transform:rotate(90deg)}
.sg-ttl{flex:1;min-width:0}
.sg-ttl b{font-size:16.5px;font-weight:800;color:#20304d}
.sg-sub{font-size:12px;color:var(--faint);margin-top:2px}
.sg-bar{width:120px;height:8px;border-radius:5px;background:#e8edf5;overflow:hidden;flex-shrink:0}
.sg-bar span{display:block;height:100%;border-radius:5px}
.sg-pct{font-size:21px;font-weight:800;color:var(--pri);width:56px;text-align:right;flex-shrink:0}
.sg-body{display:none;flex-direction:column;gap:9px;padding:6px 18px 18px;border-top:1px solid #eef2f8}
.sg-card.open .sg-body{display:flex}
.sg-empty{font-size:12px;color:var(--faint);text-align:center;padding:12px}
.add-misc{border:1px dashed var(--pri-line);border-radius:10px;padding:9px;font-size:12.5px;font-weight:600;color:var(--pri);background:var(--pri-soft)}
.add-misc:hover{background:#e2ebfb}
.assignee-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.chip{padding:8px 15px;border-radius:22px;font-size:13px;font-weight:600;background:#fff;border:1px solid var(--line);color:var(--muted)}
.chip:hover{border-color:var(--pri)}
.chip.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.chip .c{font-size:11px;opacity:.75;margin-left:5px}

.lg-card{background:#fff;border:1px solid var(--line);border-radius:11px;overflow:hidden}
.lg-head{display:flex;align-items:flex-start;gap:9px;padding:11px 12px;cursor:pointer}
.lg-head:hover{background:#f8fafd}
.lg-head .caret{color:var(--faint);transition:.2s;font-size:10px;flex-shrink:0;margin-top:3px}
.lg-card.open .lg-head .caret{transform:rotate(90deg)}
.lg-head .lg-ttl{flex:1;min-width:0}
.lg-top{display:flex;align-items:center;gap:10px;justify-content:space-between}
.lg-top b{font-size:14.5px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lg-prog{display:flex;align-items:center;gap:7px;flex-shrink:0}
.lg-prog .bar{width:64px;height:7px;border-radius:5px;background:#e8edf5;overflow:hidden}
.lg-prog .fill{height:100%;border-radius:5px}
.lg-prog .pct{font-size:13px;font-weight:800;color:#334155;width:38px;text-align:right}
.lg-meta{font-size:12px;color:var(--faint);margin-top:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.who-badge{font-size:11.5px;font-weight:600;color:var(--muted);background:#eef1f5;padding:2px 9px;border-radius:20px;white-space:nowrap}
.lg-tools{display:flex;gap:2px;flex-shrink:0}
.lg-body{display:none;padding:4px 12px 12px;background:#fbfcfe;border-top:1px solid #eef2f8}
.lg-card.open .lg-body{display:block}

.sub{border-left:2px solid #e3e9f4;margin:10px 0 10px 6px;padding-left:14px}
.sub-lv1{padding:11px 13px;background:#f6f9ff;border:1px solid #e6eefb;border-radius:11px;margin-bottom:9px}
.sub-lv2{padding:9px 12px;background:#fbfcfe;border:1px solid #eef2f8;border-radius:9px;margin-bottom:7px}
.sub-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sub-line .tag{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;white-space:nowrap}
.tag1{background:#dfeafe;color:#2f5fd0}
.tag2{background:#e9edf3;color:#64748b}
.sub-title{flex:1;min-width:140px;font-size:13px;font-weight:600;background:transparent;border:none;padding:3px 2px;color:var(--ink);border-bottom:1px dashed transparent}

function migrate(s){
  if(!s.members)s.members=[];
  if(!s._mig_ijh){
    s.members=s.members.filter(m=>m!=='이정훈');
    (s.tasks||[]).forEach(t=>{if(t.assignees)t.assignees=t.assignees.filter(a=>a!=='이정훈');});
    s._mig_ijh=true;
  }
  if(!s._mig_zero){   // 진행률 전부 0으로 초기화 — 최하위 선행지표부터 측정
    (s.tasks||[]).forEach(t=>{t.progress=0;(t.subtasks||[]).forEach(st=>{st.progress=0;(st.subs||[]).forEach(ss=>{ss.progress=0;});});});
    s._mig_zero=true;
  }
  s.members=["심혜진","김소정","박진수"];   // 담당자 고정
  if(!s._mig_owner){   // 선행지표에 담당자(owner) 부여 — 기존 건은 후행지표 첫 담당자로
    (s.tasks||[]).forEach(t=>{
      const def=(t.assignees||[])[0]||'';
      (t.subtasks||[]).forEach(st=>{
        if(!st.owner)st.owner=def;
        (st.subs||[]).forEach(ss=>{if(!ss.owner)ss.owner=st.owner||def;});
      });
    });
    s._mig_owner=true;
  }
  return s;
}
function load(){
  try{
    const r=localStorage.getItem(LS_KEY);let s=r?JSON.parse(r):seed();
    return migrate(s);
  }catch(e){return migrate(seed());}
}

  localStorage.setItem(LS_KEY,JSON.stringify(state));

}

function badgeClass(s){return{'완료':'b-done','운영중':'b-op','진행중':'b-op','준비중':'b-rdy','미시작':'b-none'}[s]||'b-none'}
function dotColor(s){return{'완료':'#2f5fd0','운영중':'#12a150','진행중':'#12a150','준비중':'#e08b00','미시작':'#c3ccda'}[s]||'#c3ccda'}
function statusFromProgress(p){p=p||0;if(p>=100)return '완료';if(p>=81)return '운영중';if(p>=41)return '진행중';if(p>=1)return '준비중';return '미시작';}

// 선행지표는 담당자(owner)별로 분리 — 전체 선택 시 모두, 특정 담당자 선택 시 본인 것만
function visSubs(t,who){
  const subs=t.subtasks||[];
  const w=who===undefined?selAssignee:who;
  if(w==='전체')return subs;
  return subs.filter(s=>s.owner===w);
}
function visSubs2(s,who){
  const arr=s.subs||[];
  const w=who===undefined?selAssignee:who;
  if(w==='전체')return arr;
  return arr.filter(ss=>(ss.owner||s.owner)===w);
}
function ownerOptions(t,cur){

  return ['',...list].map(m=>`<option value="${esc(m)}" ${cur===m?'selected':''}>${m?esc(m):'담당 미지정'}</option>`).join('');
}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000)}

function barColor(p){
  if(p>=80)return '#2ec171';
  if(p>=40)return '#e0a020';
  if(p>0)return '#e0763c';
  return '#dbe3ee';
}
// 선행지표 → 후행지표 자동 롤업: 1차는 2차 평균, 후행지표는 1차 평균
function rollupTask(t){
  const subs=t.subtasks||[];
  if(!subs.length)return; // 선행지표 없으면 수동 진행률 유지
  let sum=0;
  subs.forEach(s=>{
    const kids=s.subs||[];
    if(kids.length)s.progress=Math.round(kids.reduce((a,k)=>a+(k.progress||0),0)/kids.length);
    sum+=(s.progress||0);
  });
  t.progress=Math.round(sum/subs.length);
}
function rollupAll(){(state.tasks||[]).forEach(rollupTask);}
function dlFlag(dl){
  if(!dl)return null;
  const diff=Math.ceil((new Date(dl)-new Date(todayStr()))/864e5);
  if(diff<0)return{cls:'dl-over',dot:'dot-over',txt:'D+'+(-diff)+' 초과'};
  if(diff<=3)return{cls:'dl-soon',dot:'dot-soon',txt:diff===0?'D-day':'D-'+diff};
  return{cls:'dl-ok',dot:'dot-ok',txt:'D-'+diff};
}
/* collect all deadlines (filtered by assignee) -> {dateStr:[{tag,title,parent,cls}]} */
function collectDeadlines(){
  const map={};
  filteredTasks().forEach(t=>{
    visSubs(t).forEach(s=>{
      if(s.deadline){(map[s.deadline]=map[s.deadline]||[]).push({tag:'1차',title:s.title||'(제목없음)',parent:t.title,pct:s.progress,owner:s.owner||''});}
      visSubs2(s).forEach(ss=>{
        if(ss.deadline){(map[ss.deadline]=map[ss.deadline]||[]).push({tag:'2차',title:ss.title||'(제목없음)',parent:t.title+' › '+(s.title||''),pct:ss.progress,owner:ss.owner||s.owner||''});}
      });
    });
  });
  return map;
}

/* ---- Calendar ---- */
function upcomingText(){
  const map=collectDeadlines();const t0=todayStr();const arr=[];
  Object.keys(map).forEach(ds=>{if(ds>=t0)map[ds].forEach(it=>arr.push({ds,...it}))});
  arr.sort((a,b)=>a.ds<b.ds?-1:1);
  if(!arr.length)return '예정된 마감 없음 — 클릭해 캘린더 보기';
  const n=arr[0];const f=dlFlag(n.ds);
  return `다가오는 마감 ${arr.length}건 · ${n.ds.slice(5)} ${n.title}${f?` (${f.txt})`:''}`;
}
function calendarHTML(){
  const y=calRef.getFullYear(),mo=calRef.getMonth();
  const first=new Date(y,mo,1).getDay();
  const days=new Date(y,mo+1,0).getDate();
  const map=collectDeadlines();
  const dow=['일','월','화','수','목','금','토'];
  let cells='';
  for(let i=0;i<first;i++)cells+=`<div class="cell pad"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const items=map[ds]||[];
    const isToday=ds===todayStr();
    const isSel=ds===calSel;
    let dots='';
    if(items.length){
      const kinds=new Set(items.map(it=>{const f=dlFlag(ds);return f?f.dot:'dot-ok'}));
      dots='<div class="dots">'+[...kinds].map(k=>`<i class="${k}"></i>`).join('')+'</div>';
    }
    cells+=`<div class="cell ${items.length?'has':''} ${isToday?'today':''} ${isSel?'sel':''}" ${items.length?`data-day="${ds}"`:''}><span class="d">${d}</span>${dots}</div>`;
  }
  let detail;
  if(calSel){
    const items=(map[calSel]||[]);
    detail=`<div class="day-detail" style="margin-top:0;border-top:none;padding-top:0"><h4>📅 ${calSel} 마감 (${items.length}건)</h4>${
      items.length?items.map(it=>`
        <div class="dd-item"><span class="tg ${it.tag==='1차'?'tag1':'tag2'}">${it.tag}</span>
        <div class="dtl"><b>${esc(it.title)}</b><span>${esc(it.parent)} · ${it.pct||0}%</span></div></div>`).join('')
      :'<div style="font-size:12px;color:var(--faint)">마감 업무 없음</div>'}
      <button class="btn btn-line btn-sm" style="margin-top:6px" data-cal="clear">← 다가오는 마감 보기</button></div>`;
  }else{
    // upcoming within 14 days
    const t0=todayStr();const t14=new Date();t14.setDate(t14.getDate()+14);const t14s=t14.toISOString().slice(0,10);
    const up=[];Object.keys(map).forEach(ds=>{if(ds>=t0&&ds<=t14s)map[ds].forEach(it=>up.push({ds,...it}))});
    up.sort((a,b)=>a.ds<b.ds?-1:1);
    detail=`<div class="day-detail" style="margin-top:0;border-top:none;padding-top:0"><h4>⏰ 다가오는 마감 (2주)</h4>${
      up.length?up.slice(0,8).map(it=>{const f=dlFlag(it.ds);return `
        <div class="dd-item"><span class="tg ${it.tag==='1차'?'tag1':'tag2'}">${it.tag}</span>
        <div class="dtl"><b>${esc(it.title)}</b><span>${it.ds.slice(5)} · ${esc(it.parent)}</span></div>
        ${f?`<span class="dl-flag ${f.cls}" style="align-self:center">${f.txt}</span>`:''}</div>`}).join('')
      :'<div style="font-size:12px;color:var(--faint)">2주 내 마감 예정 업무가 없습니다.<br>날짜를 클릭하면 그날 마감이 표시됩니다.</div>'}</div>`;
  }
  return `
    <div class="cal-main">
      <div class="cal-nav">
        <button data-cal="prev">‹</button>
        <b>${y}년 ${mo+1}월</b>
        <button data-cal="next">›</button>
      </div>
      <div class="cal-grid">
        ${dow.map((d,i)=>`<div class="cal-dow ${i===0?'sun':''}">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
    <div class="cal-side">${detail}</div>`;
}

/* ---- 선행지표 이벤트 바인딩 ---- */
function bindLeading(){
  const main=$('#main');
  // assignee chips
  main.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{selAssignee=c.dataset.assignee;calSel=null;render();bindLeading();});
  // delegated clicks
  main.onclick=(e)=>{
    const t=e.target.closest('[data-action]');
    if(t){handleLeadAction(t.dataset.action,t.dataset);return;}
    const cal=e.target.closest('[data-cal]');
    if(cal){const a=cal.dataset.cal;
      if(a==='prev'){calRef.setMonth(calRef.getMonth()-1);refreshCal();}
      else if(a==='next'){calRef.setMonth(calRef.getMonth()+1);refreshCal();}
      else if(a==='clear'){calSel=null;refreshCal();}
      else if(a==='expand'){calOpen=true;render();bindLeading();}
      else if(a==='collapse'){calOpen=false;render();bindLeading();}
      return;}
    const day=e.target.closest('[data-day]');
    if(day){calSel=(calSel===day.dataset.day)?null:day.dataset.day;refreshCal();return;}
    const chip=e.target.closest('.chip');
    if(chip){selAssignee=chip.dataset.assignee;calSel=null;render();bindLeading();}
  };
  // live edits
  main.oninput=(e)=>{
    const inp=e.target;if(!inp.dataset||!inp.dataset.field)return;
    if(inp.dataset.field==='progress'){inp.parentElement.querySelector('.pv').textContent=inp.value+'%';}
  };
  // drag & drop reorder / move
  main.ondragstart=(e)=>{
    const h=e.target.closest('.drag-handle');if(!h)return;
    dragTid=h.dataset.tid;
    const card=h.closest('.lg-card');
    e.dataTransfer.effectAllowed='move';
    try{e.dataTransfer.setData('text/plain',dragTid);}catch(_){}
    if(card){try{e.dataTransfer.setDragImage(card,24,18);}catch(_){}setTimeout(()=>card.classList.add('dragging'),0);}
  };
  main.ondragover=(e)=>{
    if(!dragTid)return;
    const card=e.target.closest('.lg-card');
    const sg=e.target.closest('.sg-card');
    if(!card&&!sg)return;
    e.preventDefault();e.dataTransfer.dropEffect='move';
    main.querySelectorAll('.drop-before').forEach(el=>el.classList.remove('drop-before'));
    main.querySelectorAll('.drop-into').forEach(el=>el.classList.remove('drop-into'));
    if(card&&card.dataset.tid!==dragTid)card.classList.add('drop-before');
    else if(sg&&!card)sg.classList.add('drop-into');
  };
  main.ondrop=(e)=>{
    if(!dragTid)return;e.preventDefault();
    const card=e.target.closest('.lg-card');
    const sg=e.target.closest('.sg-card');
    const targetCat=sg?sg.dataset.cat:null;
    const beforeId=(card&&card.dataset.tid!==dragTid)?card.dataset.tid:null;
    const id=dragTid;dragTid=null;
    moveTask(id,beforeId,targetCat);
  };
  main.ondragend=()=>{dragTid=null;main.querySelectorAll('.dragging,.drop-before,.drop-into').forEach(el=>el.classList.remove('dragging','drop-before','drop-into'));};
  main.onchange=(e)=>{
    const inp=e.target;if(!inp.dataset||!inp.dataset.field)return;
    commitField(inp);
  };
  // title commit on blur/enter (change fires on blur for text inputs too)
}
function refreshCal(){const c=$('.cal-card');if(c)c.innerHTML=calendarHTML();}

function findNode(d){
  const t=state.tasks.find(x=>x.id===d.tid);if(!t)return{};
  if(!d.sid)return{t};
  const s=(t.subtasks||[]).find(x=>x.id===d.sid);if(!s)return{t};
  if(!d.ssid)return{t,s};
  const ss=(s.subs||[]).find(x=>x.id===d.ssid);return{t,s,ss};
}
function commitField(inp){
  const {t,s,ss}=findNode(inp.dataset);
  const target=ss||s;if(!target)return;
  const f=inp.dataset.field;
  if(f==='progress'){target.progress=parseInt(inp.value,10);rollupTask(t);save();render();bindLeading();return;}
  else if(f==='deadline'){target.deadline=inp.value;save();refreshCal();return;}
  else if(f==='owner'){target.owner=inp.value;save();render();bindLeading();return;}
  else if(f==='title'){target.title=inp.value;save();return;}
}
function handleLeadAction(a,d){
  const {t,s}=findNode(d);
  if(a==='toggle'){t._open=!t._open;render();bindLeading();return;}
  if(a==='add1'){t.subtasks=t.subtasks||[];const own=(selAssignee!=='전체')?selAssignee:((t.assignees||[])[0]||'');t.subtasks.push({id:uid(),title:'',owner:own,progress:0,deadline:'',subs:[]});t._open=true;rollupTask(t);save();render();bindLeading();return;}
  if(a==='add2'){s.subs=s.subs||[];s.subs.push({id:uid(),title:'',owner:s.owner||'',progress:0,deadline:''});rollupTask(t);save();render();bindLeading();return;}
  if(a==='del1'){if(confirm('1차 선행지표를 삭제할까요? (하위 2차도 함께 삭제)')){t.subtasks=t.subtasks.filter(x=>x.id!==d.sid);rollupTask(t);save();render();bindLeading();}return;}
  if(a==='del2'){if(confirm('2차 선행지표를 삭제할까요?')){s.subs=s.subs.filter(x=>x.id!==d.ssid);rollupTask(t);save();render();bindLeading();}return;}
}

/* ---- PNG Export ---- */
function ensureH2C(cb){
  if(window.html2canvas)return cb();
  toast('이미지 엔진 불러오는 중…');
  const urls=['https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',
              'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js'];
  let i=0;
  const tryLoad=()=>{
    if(i>=urls.length){toast('이미지 엔진 로드 실패 — 인터넷 연결을 확인하세요');return;}
    const s=document.createElement('script');s.src=urls[i++];
    s.onload=()=>window.html2canvas?cb():tryLoad();
    s.onerror=tryLoad;
    document.head.appendChild(s);
  };
  tryLoad();
}
function gbBar(p){return `<span class="gb-bar"><span style="width:${p||0}%;background:${barColor(p)}"></span></span>`;}
function todayDot(){return todayStr().replace(/-/g,'.');}
function gbTaskCard(t){
  const all=selAssignee==='전체';
  const ownTag=(o)=>o?`<span class="gb-own">${esc(o)}</span>`:'';
  const subs=visSubs(t).map(s=>{
    const s2=visSubs2(s).map(ss=>`<div class="gs-lead2 gb-lead2"><span>${esc(ss.title||'-')}</span>${all?ownTag(ss.owner||s.owner):''}<b>${ss.progress||0}%</b></div>`).join('');
    return `<div class="gb-lead"><span>${esc(s.title||'-')}</span>${all?ownTag(s.owner):''}<b>${s.progress||0}%</b></div>${s2}`;
  }).join('');
  return `<div class="gb-card">
    <div class="gb-card-h">
      <span class="gb-t">${esc(t.title)}</span>
      <span class="gb-p">${gbBar(t.progress)}<b>${t.progress||0}%</b></span>
    </div>
    ${subs?`<div class="gb-subs">${subs}</div>`:''}
  </div>`;
}
function buildGrowthBoard(weekLabel){
  const who=selAssignee==='전체'?'기술연구소 전체':selAssignee;
  const tasks=filteredTasks().filter(t=>t.category!==MISC);
  const groups={};tasks.forEach(t=>{(groups[t.category]=groups[t.category]||[]).push(t)});
  const cats=KPI_LABELS.filter(c=>groups[c]);
  const overall=tasks.length?Math.round(tasks.reduce((a,t)=>a+(t.progress||0),0)/tasks.length):0;
  const sections=cats.map(cat=>{
    const arr=groups[cat].slice().sort((a,b)=>(b.progress||0)-(a.progress||0));
    const avg=arr.length?Math.round(arr.reduce((a,t)=>a+(t.progress||0),0)/arr.length):0;
    return `<div class="gb-sec">
      <div class="gb-sec-head"><span>${esc(cat)}</span><b>${avg}%</b></div>
      <div class="gb-tasks">${arr.map(gbTaskCard).join('')}</div>
    </div>`;
  }).join('');
  return `<div class="gb-head">
      <div class="gb-h1">${esc(who)} 그로스보드 <span>${weekLabel?esc(weekLabel)+' 기록':todayDot()}</span></div>
      <div class="gb-h2">달성률 <b>${overall}%</b></div>
    </div><div class="gb-grid">${sections||'<div class="gb-empty">표시할 후행지표가 없습니다.</div>'}</div>`;
}
function exportGrowthBoard(weekLabel,onDone){
  ensureH2C(()=>{
    toast('그로스보드 생성 중…');
    const who=selAssignee==='전체'?'기술연구소 전체':selAssignee;
    const label=selAssignee==='전체'?'기술연구소 그로스보드':who+' 개인 그로스보드';
    const wrap=document.createElement('div');
    wrap.className='gb-export';
    wrap.style.cssText='position:fixed;left:-99999px;top:0;width:1500px;background:#fff;padding:40px;';
    wrap.innerHTML=buildGrowthBoard(weekLabel);
    document.body.appendChild(wrap);
    setTimeout(()=>{
      const fin=()=>{try{document.body.removeChild(wrap);}catch(_){}if(onDone)onDone();};
      try{
        window.html2canvas(wrap,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false}).then(canvas=>{
          fin();
          if(!canvas||!canvas.width){toast('생성 실패: 빈 이미지');return;}
          const url=canvas.toDataURL('image/png');
          const fname=`${weekLabel?weekLabel+'_':todayDot()+'_'}${label}.png`;
          openModal(`
            <h3>그로스보드 미리보기</h3>
            <p style="font-size:12.5px;color:var(--muted);margin:-8px 0 14px">${esc(label)} · ${weekLabel||todayDot()} · 확인 후 다운로드하세요</p>
            <div style="max-height:58vh;overflow:auto;border:1px solid var(--line);border-radius:10px;background:#fff">
              <img src="${url}" style="width:100%;display:block">
            </div>
            <div class="modal-foot">
              <button class="btn btn-line" onclick="closeModal()">닫기</button>
              <a class="btn btn-pri" href="${url}" download="${fname}" onclick="toast('다운로드 시작 ✔')">⬇ PNG 다운로드</a>
            </div>`, true);
        }).catch(err=>{fin();toast('생성 실패: '+(err&&err.message||err));});
      }catch(e){fin();toast('생성 실패: '+(e&&e.message||e));}
    },80);
  });
}

        <b>「↺ 복원」</b>으로 그 시점 데이터를 그대로 되돌릴 수 있고, <b>JSON</b>으로 따로 내려받아 보관할 수도 있습니다.
      </p>
      ${snapList.length?`<div class="snap-list">${snapList.map(r=>`
        <div class="snap-row">
          <span class="snap-wk">${esc((r.data&&r.data.week)||r.id.replace('snap:',''))}</span>
          <span class="snap-dt">${esc((r.data&&r.data.date)||'')}</span>
          <button class="btn btn-line btn-sm" onclick="downloadSnapshot('${r.id}')">⬇ JSON</button>
          <button class="btn btn-line btn-sm" onclick="snapGrowthBoard('${r.id}')">🖼 그로스보드</button>
          <button class="btn btn-pri btn-sm" onclick="restoreSnapshot('${r.id}')">↺ 복원</button>
        </div>`).join('')}</div>`
      :`<div style="font-size:12.5px;color:var(--faint);padding:14px;text-align:center;background:#f8fafd;border-radius:10px">아직 저장된 기록이 없습니다.${cloudOn?' 「＋ 지금 기록 저장」으로 첫 복원 지점을 만들어 두세요.':' (클라우드 연결 필요)'}</div>`}
    </div>

    <div class="panel" style="margin-top:22px">
      <div class="panel-head"><h3>💾 데이터 저장소</h3>${cloudStatusHTML()}</div>
      <p style="font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:14px">
        입력한 모든 내용은 <b>자동 저장</b>되며, 클라우드 연결 시 팀 전체에 <b>실시간 동기화</b>됩니다.
        만일에 대비해 <b>「⬇ 백업 내보내기」</b>로 JSON 파일을 보관해 두고, 데이터가 날아가면 <b>「⬆ 백업 불러오기」</b>로 그 파일을 넣어 그대로 되살릴 수 있습니다.
      </p>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-line btn-sm" onclick="exportData()">⬇ 백업 내보내기 (JSON)</button>
        <button class="btn btn-line btn-sm" onclick="document.getElementById('import-file').click()">⬆ 백업 불러오기</button>
        <input type="file" id="import-file" accept="application/json" style="display:none" onchange="importData(this)">
        <button class="btn btn-line btn-sm" style="color:#d33;border-color:#f3c4c4" onclick="resetData()">↺ 초기 상태로 되돌리기</button>
      </div>
      ${!SUPABASE_KEY?`<p style="font-size:11.5px;color:var(--faint);margin-top:12px;line-height:1.6">
        ☁ <b>클라우드 켜기 (파트너 허브와 동일 방식):</b> allrenew Supabase 프로젝트에 <code>techlab_dashboard</code> 테이블을 만들고(파일 상단 SQL 1회 실행), <code>SUPABASE_KEY</code>에 파트너 허브와 같은 anon 키를 넣으면 됩니다. 키만 알려주시면 대신 넣어드릴게요.</p>`:''}
    </div>

    <p style="font-size:12px;color:var(--faint);margin-top:16px;line-height:1.6">
      💡 팀원 여러 명이 같은 데이터를 공유하려면 Firebase/Supabase 연동이 필요합니다. 프로젝트 설정(config)을 주시면 실시간 동기화로 연결해 드릴 수 있습니다.
    </p>`;
}
function openTool(k){const u=TOOLS[k]&&TOOLS[k].url;if(!u){toast('URL 준비중입니다');return;}window.open(u,'_blank');}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`기술연구소_대시보드_백업_${todayStr()}.json`;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);toast('백업 파일 저장됨 ✔');
}
function importData(input){
  const f=input.files&&input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(!d||!Array.isArray(d.tasks))throw 0;
      if(!confirm('현재 데이터를 이 백업으로 덮어씁니다.\n(클라우드에 연결돼 있으면 팀 전체에 반영됩니다) 계속할까요?'))return;
      state=migrate(d); rollupAll();
      localStorage.setItem(LS_KEY,JSON.stringify(state));
      cloudPush();
      render();toast('데이터 복원 완료 ✔');
    }catch(e){toast('불러오기 실패: 올바른 백업 파일이 아닙니다');}
  };
  r.readAsText(f);input.value='';
}
/* 주간 스냅샷 → 현재 데이터로 복원 */
function restoreSnapshot(id){
  const row=snapList.find(r=>r.id===id);
  if(!row||!row.data||!row.data.snapshot){toast('기록을 찾을 수 없습니다');return;}
  const wk=(row.data.week||id.replace('snap:',''));
  if(!confirm(`${wk} 기록(${row.data.date||''})으로 되돌립니다.\n현재 데이터는 이 시점 데이터로 덮어써집니다.\n(클라우드 연결 시 팀 전체 반영) 계속할까요?`))return;
  state=migrate(JSON.parse(JSON.stringify(row.data.snapshot))); rollupAll();
  localStorage.setItem(LS_KEY,JSON.stringify(state));
  cloudPush();
  render();toast(wk+' 기록으로 복원됨 ✔');
}
/* 주간 스냅샷 → JSON 파일로 내려받기 */
function downloadSnapshot(id){
  const row=snapList.find(r=>r.id===id);
  if(!row||!row.data||!row.data.snapshot){toast('기록을 찾을 수 없습니다');return;}
  const wk=(row.data.week||id.replace('snap:',''));
  const blob=new Blob([JSON.stringify(row.data.snapshot,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`기술연구소_백업_${wk}.json`;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);toast('백업 파일 저장됨 ✔');
}
/* 수동 스냅샷(지금 시점 기록) */
function saveSnapshotNow(){
  if(!cloudOn||!sb){toast('클라우드 연결이 필요합니다');return;}
  const k=weekKey();const id='snap:'+k;
  sb.from(CLOUD_TABLE).upsert({id,data:{week:k,date:todayStr(),snapshot:cloudPayload()},updated_at:new Date().toISOString()}).then(({error})=>{
    if(error){toast('저장 실패: '+error.message);return;}
    toast(k+' 기록 저장됨 ✔');loadSnapshots();
  });
}
function resetData(){if(confirm('모든 데이터를 초기 상태로 되돌립니다.\n(클라우드 연결 시 팀 전체 반영) 계속할까요?')){state=migrate(seed());rollupAll();localStorage.setItem(LS_KEY,JSON.stringify(state));cloudPush();render();toast('초기화됨');}}

/* ============================================================
   MODALS (핵심과제 / KPI)
============================================================ */
function openModal(html,wide){const m=$('#modal');m.className='modal'+(wide?' wide':'');m.innerHTML=html;$('#overlay').classList.add('show');}
function closeModal(){$('#overlay').classList.remove('show');}
$('#overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});

function openTaskModal(id,presetCat){
  const t=id?state.tasks.find(x=>x.id===id):null;
  const curCat=t?t.category:(presetCat||KPI_LABELS[0]);
  const sel=t?(t.assignees||[]):['심혜진','김소정'];
  const chips=(state.members||['심혜진','김소정','박진수']).map(m=>`<button type="button" class="assign-chip ${sel.includes(m)?'sel':''}" data-a="${esc(m)}" onclick="this.classList.toggle('sel')">${esc(m)}</button>`).join('');
  openModal(`
    <h3>${t?'후행지표 수정':'후행지표 추가'}</h3>
    <div class="fld"><label>전략목표</label>
      <select id="m-cat">${[...KPI_LABELS,MISC].map(c=>`<option ${curCat===c?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="fld"><label>후행지표명</label><input id="m-title" value="${t?esc(t.title):''}" placeholder="예) POUR듀얼복합시트 개선 연구"></div>
    <div class="fld"><label>담당자 <span style="font-weight:400;color:var(--faint)">(복수 선택)</span></label>
      <div class="assign-chips" id="m-assign">${chips}</div></div>
    <div class="fld"><label>진행률 (%)</label><input id="m-prog" type="number" min="0" max="100" value="${t?t.progress:0}" ${t&&(t.subtasks||[]).length?'disabled':''}>
      ${t&&(t.subtasks||[]).length?'<div class="hint">선행지표 평균으로 자동 계산됩니다 (수정하려면 선행지표에서 조정)</div>':'<div class="hint">상태(미시작·준비중·진행중·운영중·완료)는 진행률에 따라 자동 표시됩니다. 선행지표를 등록하면 진행률도 자동 계산돼요.</div>'}</div>
    <div class="modal-foot">
      <button class="btn btn-line" onclick="closeModal()">취소</button>
      <button class="btn btn-pri" onclick="saveTask('${id||''}')">저장</button>
    </div>`);
}
function saveTask(id){
  const cat=$('#m-cat').value, title=$('#m-title').value.trim();
  if(!title){toast('후행지표명을 입력해 주세요');return;}
  const assignees=[...document.querySelectorAll('#m-assign .assign-chip.sel')].map(b=>b.dataset.a);
  const progress=Math.max(0,Math.min(100,parseInt($('#m-prog').value||0,10)));
  if(id){const t=state.tasks.find(x=>x.id===id);Object.assign(t,{category:cat,title,assignees,progress});rollupTask(t);}
  else{state.tasks.push({id:uid(),category:cat,title,assignees,progress,subtasks:[]});}
  save();closeModal();render();toast('저장됨');
}
function delTask(id){if(confirm('이 후행지표와 하위 선행지표를 모두 삭제할까요?')){state.tasks=state.tasks.filter(t=>t.id!==id);save();render();toast('삭제됨');}}
function moveTask(dragId,beforeId,targetCat){
  const idx=state.tasks.findIndex(t=>t.id===dragId);if(idx<0)return;
  const [item]=state.tasks.splice(idx,1);
  if(targetCat)item.category=targetCat;
  if(beforeId){
    let b=state.tasks.findIndex(t=>t.id===beforeId);
    if(b<0)b=state.tasks.length;
    state.tasks.splice(b,0,item);
  }else{
    let last=-1;state.tasks.forEach((t,i)=>{if(t.category===item.category)last=i;});
    state.tasks.splice(last+1,0,item);
  }
  save();render();bindLeading();
}
function addMisc(){
  const who=(selAssignee!=='전체')?[selAssignee]:[];
  const t={id:uid(),category:MISC,title:'새 기타업무',assignees:who,status:'진행중',progress:0,subtasks:[]};
  t._open=true;state.tasks.push(t);save();render();bindLeading();toast('기타업무 추가됨 — ✎로 이름·담당자를 수정하세요');
}

function openMissionKpi(){
  openModal(`
    <h3>팀 미션 · 전략목표 목표 수정</h3>
    <div class="fld"><label>팀 미션</label><input id="m-mission" value="${esc(state.mission)}"></div>
    <div class="hint" style="margin:-6px 0 14px">전략목표별 진척률(%)은 소속 후행지표의 평균으로 자동 계산됩니다. 아래는 참고용 목표치만 입력합니다.</div>
    ${state.kpis.map((k,i)=>`
      <div class="fld"><label>${esc(k.label)} — 목표(선택)</label>
        <input id="kpi-frac-${i}" value="${esc(k.frac)}" placeholder="예) 40/85%, 5/50개, 3억원">
      </div>`).join('')}
    <div class="modal-foot">
      <button class="btn btn-line" onclick="closeModal()">취소</button>
      <button class="btn btn-pri" onclick="saveMissionKpi()">저장</button>
    </div>`);
}
function saveMissionKpi(){
  state.mission=$('#m-mission').value;
  state.kpis.forEach((k,i)=>{k.frac=$('#kpi-frac-'+i).value;});
  save();closeModal();render();toast('저장됨');
}

/* ============================================================
   CLOUD SYNC
============================================================ */
function cloudInit(){
  if(!SUPABASE_URL||!SUPABASE_KEY||!window.supabase){cloudOn=false;cloudRefresh();return;}
  try{
    sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    cloudOn=true;
    // 초기 로드 (로컬로 즉시 렌더된 뒤 클라우드 동기화)
    sb.from(CLOUD_TABLE).select('data').eq('id',CLOUD_ROW).maybeSingle().then(({data,error})=>{
      if(error){cloudErr=/relation|does not exist|not find the table|schema cache/i.test(error.message||'')?'table':'err';cloudReady=false;cloudRefresh();return;}
      cloudErr='';
      if(data&&data.data&&data.data.tasks)applyRemote(data.data);
      else cloudPush();   // 빈 경우 현재 로컬 데이터로 시드
      cloudReady=true;cloudRefresh();autoSnapshot();loadSnapshots();
    });
    // 실시간 구독 — 다른 사람이 바꾸면 자동 반영
    sb.channel('techlab-sync').on('postgres_changes',{event:'*',schema:'public',table:CLOUD_TABLE},payload=>{
      const row=payload.new;
      if(row&&row.id===CLOUD_ROW&&row.data&&row.data.tasks)applyRemote(row.data);
    }).subscribe();
  }catch(e){cloudOn=false;updateSyncBadge();}
}
function applyRemote(val){
  const needPush = !val._mig_zero || !val._mig_ijh;
  const openMap={};(state.tasks||[]).forEach(t=>{if(t._open)openMap[t.id]=true;});
  applyingRemote=true;
  state=migrate(val);
  (state.tasks||[]).forEach(t=>{if(openMap[t.id])t._open=true;});
  rollupAll();
  localStorage.setItem(LS_KEY,JSON.stringify(state));
  render();
  applyingRemote=false;
  updateSyncBadge();
  if(needPush)cloudPush();   // 마이그레이션 결과를 클라우드에 반영
}
function cloudPush(){
  if(!cloudOn||!sb)return;
  try{sb.from(CLOUD_TABLE).upsert({id:CLOUD_ROW,data:cloudPayload(),updated_at:new Date().toISOString()}).then(()=>{});}catch(e){}
}
/* ---- 주간 그로스보드 자동 스냅샷 ---- */
function weekKey(d){
  const dt=new Date(d||Date.now());
  const t=new Date(Date.UTC(dt.getFullYear(),dt.getMonth(),dt.getDate()));
  const day=t.getUTCDay()||7;t.setUTCDate(t.getUTCDate()+4-day);
  const y0=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  const wk=Math.ceil(((t-y0)/864e5+1)/7);
  return `${t.getUTCFullYear()}-W${String(wk).padStart(2,'0')}`;
}
function autoSnapshot(){
  if(!cloudOn||!sb)return;
  const k=weekKey();
  const id='snap:'+k;
  sb.from(CLOUD_TABLE).select('id').eq('id',id).maybeSingle().then(({data,error})=>{
    if(error||data)return;   // 이미 이번 주 기록 있음
    sb.from(CLOUD_TABLE).upsert({id,data:{week:k,date:todayStr(),snapshot:cloudPayload()},updated_at:new Date().toISOString()}).then(()=>{
      if(view==='tools')render();
    });
  });
}
let snapList=[];
function loadSnapshots(cb){
  if(!cloudOn||!sb){snapList=[];cb&&cb();return;}
  sb.from(CLOUD_TABLE).select('id,data,updated_at').like('id','snap:%').order('id',{ascending:false}).then(({data,error})=>{
    snapList=(!error&&data)?data:[];
    cb?cb():(view==='tools'&&render());
  });
}
function snapGrowthBoard(id){
  const row=snapList.find(r=>r.id===id);
  if(!row||!row.data||!row.data.snapshot){toast('기록을 찾을 수 없습니다');return;}
  const saved=state, savedSel=selAssignee;
  state=row.data.snapshot; rollupAll();
  exportGrowthBoard(row.data.week,()=>{state=saved;selAssignee=savedSel;});
}
function cloudState(){
  if(!SUPABASE_KEY)return 'off';
  if(cloudErr==='table')return 'table';
  if(cloudErr==='err')return 'err';
  if(cloudOn&&cloudReady)return 'on';
  if(cloudOn)return 'wait';
  return 'err';
}
function cloudStatusHTML(){
  return {
    off:'<span class="cloud-tag off">💾 로컬 저장 중 · 클라우드 미설정</span>',
    table:'<span class="cloud-tag err">⚠ techlab_dashboard 테이블이 없습니다 · SQL 1회 실행 필요</span>',
    err:'<span class="cloud-tag err">⚠ 클라우드 연결 실패 · 로컬 저장으로 동작</span>',
    on:'<span class="cloud-tag on">☁ Supabase 연결됨 · 실시간 동기화 중</span>',
    wait:'<span class="cloud-tag wait">☁ 클라우드 연결 중…</span>'
  }[cloudState()];
}
function updateSyncBadge(){
  const el=document.getElementById('sync-badge');if(!el)return;
  const m={off:['s-off','로컬 저장'],table:['s-err','테이블 없음 · SQL 실행'],err:['s-err','연결 실패 · 로컬 저장'],on:['s-on','실시간 동기화 중'],wait:['s-wait','클라우드 연결 중…']};
  const [c,t]=m[cloudState()]||m.err;
  el.className='nav-sync '+c;
  el.innerHTML='<span class="d"></span>'+t;
}
function cloudRefresh(){updateSyncBadge();if(view==='tools')render();}

/* ============================================================
   NAV BINDING + INIT
============================================================ */
document.querySelectorAll('.nav-item').forEach(n=>{
  n.addEventListener('click',()=>{
    if(n.dataset.view)setView(n.dataset.view);
    else if(n.dataset.ext){const u=TOOLS[n.dataset.ext]&&TOOLS[n.dataset.ext].url;if(u)window.open(u,'_blank');else{setView('tools');toast('URL 준비중입니다');}}
  });
});
render();
cloudInit();
updateSyncBadge();
</script>
